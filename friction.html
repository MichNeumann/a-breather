<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take a Breath...</title>
    <style>
        :root {
            --bg-color: #f4f4f7;
            --text-color: #2d3748;
            --accent-color: #6366f1;
            --button-hover: #4f46e5;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 400px;
            padding: 20px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 500;
            margin-bottom: 10px;
        }

        p {
            color: #718096;
            margin-bottom: 40px;
        }

        /* Breathing Animation Setup */
        .circle-container {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .breathing-circle {
            width: 60px;
            height: 60px;
            background-color: var(--accent-color);
            border-radius: 50%;
            opacity: 0.6;
            animation: breathe 8s cubic-bezier(0.42, 0, 0.58, 1) infinite;
        }

        @keyframes breathe {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.4;
            }

            50% {
                transform: scale(2.5);
                opacity: 0.8;
            }
        }

        /* Choice Panel (Hidden initially) */
        .choices-panel {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
            pointer-events: none;
        }

        .choices-panel.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .time-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        button {
            background-color: white;
            color: var(--text-color);
            border: 1px solid #e2e8f0;
            padding: 14px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            border-color: var(--accent-color);
            background-color: #fafafa;
        }

        .close-btn {
            grid-column: span 2;
            background-color: #e2e8f0;
            border: none;
            color: #4a5568;
        }

        .close-btn:hover {
            background-color: #cbd5e1;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1 id="status-text">Take a deep breath in...</h1>

        <div class="circle-container">
            <div class="breathing-circle" id="circle"></div>
        </div>

        <div class="choices-panel" id="choices">
            <p>How much time will you spend here?</p>
            <div class="time-options">
                <button class="time-btn" data-minutes="1">1 Minute</button>
                <button class="time-btn" data-minutes="3">3 Minutes</button>
                <button class="time-btn" data-minutes="5">5 Minutes</button>
                <button class="time-btn" data-minutes="10">10 Minutes</button>
                <button class="close-btn" id="close-tab-btn">Nevermind, close tab</button>
            </div>
        </div>
    </div>

    <script src="friction.js"></script>
</body>

</html>
