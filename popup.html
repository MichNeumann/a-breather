<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>A Breather Dashboard</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background-color: #f8fafc;
      color: #1e293b;
    }

    h2 {
      font-size: 1.2rem;
      margin-top: 0;
      margin-bottom: 16px;
      font-weight: 600;
    }

    /* Strict Mode Toggle Panel */
    .toggle-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      margin-bottom: 16px;
    }

    .toggle-label {
      font-size: 0.95rem;
      font-weight: 500;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #cbd5e1;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      border-radius: 50%;
    }

    /* General Extension Theme: Blue */
    input:checked+.slider {
      background-color: #2563eb;
    }

    /* Specific Extension Enable Override: Red Theme */
    #master-toggle:checked+.slider {
      background-color: #00ab66;
    }

    input:checked+.slider:before {
      transform: translateX(20px);
    }

    /* Input Controls (Blue Theme) */
    .input-box {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      font-size: 0.9rem;
    }

    input[type="text"]:focus {
      outline: 2px solid #3b82f6;
      border-color: transparent;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 0 14px;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background-color 0.2s ease;
    }

    button:hover {
      background: #1d4ed8;
    }

    /* Sites List */
    .site-list {
      max-height: 180px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .site-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      font-size: 0.9rem;
    }

    .delete-btn {
      background: transparent;
      color: #ef4444;
      border: none;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: bold;
    }

    .delete-btn:hover {
      color: #b91c1c;
      background: #ffeeee;
      border-radius: 4px;
    }

    /* Custom Range Slider Thumb Styling */
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #2563eb;
      cursor: pointer;
      transition: background-color 0.15s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #1d4ed8;
    }

    /* Only allow smooth transitions AFTER the page has fully loaded its data */
    body:not(.preload) .slider,
    body:not(.preload) .slider:before {
      transition: transform .3s ease, background-color .3s ease;
    }

    /* Pill Selection Buttons */
    .pill-btn {
      background: #f1f5f9;
      color: #334155;
      border: 1px solid #cbd5e1;
      padding: 4px 8px;
      font-size: 0.8rem;
      border-radius: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .pill-btn:hover {
      background: #e2e8f0;
      border-color: #94a3b8;
      color: #0f172a;
    }
  </style>
</head>

<body class="preload">

  <h2>A Breather, Settings</h2>

  <div id="grace-timer-container"
    style="background: #eff6ff; padding: 12px; border-radius: 12px; border: 1px solid #bfdbfe; margin-bottom: 16px; display: none; text-align: center; box-sizing: border-box;">
    <span style="font-size: 0.9rem; color: #1e40af; font-weight: 500;">Active Session: </span>
    <span id="grace-timer-countdown" style="font-size: 0.95rem; color: #1d4ed8; font-weight: bold;">00:00 left</span>
  </div>

  <div id="master-card"
    style="background: white; border-radius: 12px 12px 0 0; border: 1px solid #e2e8f0; border-bottom: none; min-height: 48px; display: flex; align-items: center; padding: 0 12px; box-sizing: border-box;">

    <div id="master-active-view"
      style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
      <span class="toggle-label" style="color: #000000; font-weight: bold;">"A Breather" Active?</span>
      <label class="switch">
        <input type="checkbox" id="master-toggle">
        <span class="slider"></span>
      </label>
    </div>

    <div id="master-snooze-view"
      style="display: none; justify-content: space-between; align-items: center; width: 100%;">
      <span class="toggle-label" style="font-size: 0.85rem; color: #64748b; font-weight: 600;">Pause for:</span>
      <div style="display: flex; align-items: center; gap: 6px;">
        <button class="pill-btn" data-snooze="5">5m</button>
        <button class="pill-btn" data-snooze="10">10m</button>
        <button class="pill-btn" data-snooze="20">20m</button>
        <button class="pill-btn" data-snooze="30">30m</button>
        <button id="cancel-snooze-btn"
          style="background: transparent; color: #94a3b8; border: none; padding: 4px 6px; font-weight: bold; cursor: pointer; font-size: 0.9rem;">✕</button>
      </div>
    </div>

    <div id="master-countdown-view"
      style="display: none; justify-content: space-between; align-items: center; width: 100%;">
      <span id="snooze-countdown-text" style="font-size: 0.9rem; color: #ae1ff5; font-weight: bold;">Paused:
        00:00</span>
      <button id="resume-btn"
        style="background: #2563eb; color: white; border: none; padding: 5px 12px; font-size: 0.8rem; font-weight: 600; border-radius: 6px; cursor: pointer;">Resume</button>
    </div>

  </div>

  <div class="toggle-container" style="border-top: none; border-radius: 0 0 12px 12px; margin-top: -1px;">
    <span class="toggle-label">Strict Mode (Kick Mid-Session)</span>
    <label class="switch">
      <input type="checkbox" id="strict-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="slider-container"
    style="background: white; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 16px; display: flex; flex-direction: column; gap: 8px; margin-top: 16px;">
    <div style="display: flex; justify-content: space-between; font-size: 0.95rem; font-weight: 500;">
      <span>Breathing Duration</span>
      <span id="breath-count" style="color: #2563eb; font-weight: bold;">1 Breath</span>
    </div>
    <input type="range" id="breath-slider" min="1" max="5" value="1" step="1"
      style="-webkit-appearance: none; width: 100%; height: 6px; border-radius: 5px; background: #cbd5e1; outline: none; margin: 8px 0;">
  </div>

  <div class="input-box" style="margin-top: 16px;">
    <input type="text" id="site-input" placeholder="e.g., instagram.com">
    <button id="add-btn">Add</button>
  </div>

  <div class="site-list" id="site-list"></div>

  <script src="popup.js"></script>
</body>

</html>
